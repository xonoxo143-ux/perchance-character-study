name: Research Cleanup

on:
  push:
    branches:
      - character-shape-research
    paths:
      - 'research/cleanup/REMOVE_*.txt'
      - 'scripts/remove_research_samples.py'
      - '.github/workflows/research-cleanup.yml'
  workflow_dispatch:
    inputs:
      request_file:
        description: 'Optional cleanup request file, e.g. research/cleanup/REMOVE_030_032.txt'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: research-cleanup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  clean-research:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: character-shape-research
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Remove invalid research samples
        run: |
          if [ -n "${{ github.event.inputs.request_file }}" ]; then
            python scripts/remove_research_samples.py --request-file "${{ github.event.inputs.request_file }}"
          else
            python scripts/remove_research_samples.py
          fi

      - name: Regenerate generated index if script exists
        run: |
          if [ -f scripts/generate_research_index.py ]; then
            python scripts/generate_research_index.py
          fi

      - name: Commit cleanup changes
        run: |
          if git diff --quiet; then
            echo "No cleanup changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A research scripts .github/workflows
          git commit -m "Clean invalid research samples [skip ci]"
          git pull --rebase origin character-shape-research
          git push origin character-shape-research
